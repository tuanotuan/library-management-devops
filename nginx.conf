server {
    listen 80;
    listen [::]:80;
    server_name tuan-library.duckdns.org;

    # Tự động đá khách từ HTTP sang HTTPS cho nó bảo mật
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tuan-library.duckdns.org;

    # Đường dẫn chứng chỉ (Sau khi chạy Certbot trên AWS nó sẽ tự đẻ ra 2 file này)
    ssl_certificate /etc/letsencrypt/live/tuan-library.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuan-library.duckdns.org/privkey.pem;

    # Cấu hình tối ưu cho SSL (Vibe chuyên nghiệp)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Hướng dẫn khách vào Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Hướng dẫn khách gọi API vào Backend
    location /api {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}